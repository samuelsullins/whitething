name: Build & Release

# Fire only when you push a version tag like v1.0.0 — not on every commit.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # needed so the job can create a GitHub Release

jobs:
  build:
    runs-on: macos-15    # macOS runner — required to run Xcode / notarytool

    env:
      SCHEME: WhiteThing
      APP_NAME: WhiteThing.app

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # --- Step A: put your Developer ID cert into a temporary keychain ---------
      # The runner has no Keychain of its own. We create a throwaway one,
      # unlock it, and import your .p12 (decoded from the base64 secret).
      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          # A random password for the temp keychain — thrown away with the runner.
          KP="$(openssl rand -base64 24)"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # Let codesign use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KEYCHAIN"
          # Make this keychain the one xcodebuild/codesign search.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      # --- Step B: compile into an .xcarchive, signed with Developer ID ---------
      - name: Archive
        run: |
          xcodebuild archive \
            -project WhiteThing.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/WhiteThing.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=MJ9R3XRRGM

      # --- Step C: export the .app out of the archive using our plist -----------
      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WhiteThing.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ci/ExportOptions.plist

      # --- Step D: notarize with Apple, then staple the ticket ------------------
      # notarytool needs a zip to upload. After Apple approves, we staple the
      # ticket INTO the .app so it verifies offline, then zip the final result.
      - name: Notarize & staple
        env:
          NOTARY_API_KEY_BASE64: ${{ secrets.NOTARY_API_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          APP="$RUNNER_TEMP/export/$APP_NAME"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$NOTARY_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          # zip for submission (ditto preserves the bundle correctly)
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/submit.zip"

          xcrun notarytool submit "$RUNNER_TEMP/submit.zip" \
            --key "$KEY_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP"

      # --- Step E: package the stapled app for download -------------------------
      - name: Package
        run: |
          APP="$RUNNER_TEMP/export/$APP_NAME"
          # Constant filename so the README can link to a permanent
          # /releases/latest/download/WhiteThing.zip URL. The release tag/notes
          # still carry the version, so nothing about versioning is lost.
          OUT="WhiteThing.zip"
          ditto -c -k --keepParent "$APP" "$OUT"
          echo "ASSET=$OUT" >> "$GITHUB_ENV"

      # --- Step F: publish a GitHub Release with the zip attached ---------------
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # provided automatically by Actions
        run: |
          gh release create "$GITHUB_REF_NAME" "$ASSET" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
